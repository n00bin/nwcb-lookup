<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="tfbg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2a1a08"/>
      <stop offset="100%" stop-color="#0a0705"/>
    </radialGradient>
    <linearGradient id="tfmetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4945c"/>
      <stop offset="100%" stop-color="#6b3a14"/>
    </linearGradient>
    <linearGradient id="tfhammer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c878"/>
      <stop offset="100%" stop-color="#8b6f2f"/>
    </linearGradient>
    <radialGradient id="tffire" cx="50%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#ffb74d" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#f0883e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#tfbg)" stroke="#f0883e" stroke-width="1.5" stroke-opacity="0.55"/>
  <!-- Forge fire glow under anvil -->
  <ellipse cx="32" cy="55" rx="24" ry="8" fill="url(#tffire)"/>
  <!-- Anvil top + horn (left horn extends from the flat top) -->
  <path d="M 12 32 Q 8 33 8 35 L 8 38 L 56 38 L 56 32 L 18 32 Z"
        fill="url(#tfmetal)" stroke="#f0e2bc" stroke-width="0.5" stroke-opacity="0.7"/>
  <!-- Anvil waist -->
  <rect x="24" y="38" width="16" height="6" fill="url(#tfmetal)" stroke="#f0e2bc" stroke-width="0.5" stroke-opacity="0.7"/>
  <!-- Anvil base -->
  <rect x="18" y="44" width="28" height="7" rx="1" fill="url(#tfmetal)" stroke="#f0e2bc" stroke-width="0.5" stroke-opacity="0.7"/>
  <!-- Hammer (angled, striking the anvil's top) -->
  <g transform="translate(40 16) rotate(35)">
    <rect x="-3" y="-3" width="14" height="6" rx="1" fill="url(#tfhammer)" stroke="#f0e2bc" stroke-width="0.4"/>
    <rect x="-15" y="-1" width="13" height="2" rx="0.5" fill="#6b4a1e" stroke="#3d2a10" stroke-width="0.3"/>
  </g>
  <!-- Sparks flying from strike point -->
  <path d="M 22 28 L 22.5 29.5 L 24 30 L 22.5 30.5 L 22 32 L 21.5 30.5 L 20 30 L 21.5 29.5 Z"
        fill="#ffd966" opacity="0.95"/>
  <path d="M 16 22 L 16.3 23 L 17.3 23.3 L 16.3 23.6 L 16 24.6 L 15.7 23.6 L 14.7 23.3 L 15.7 23 Z"
        fill="#ffd966" opacity="0.65"/>
  <path d="M 18 18 L 18.3 19 L 19.3 19.3 L 18.3 19.6 L 18 20.6 L 17.7 19.6 L 16.7 19.3 L 17.7 19 Z"
        fill="#ffd966" opacity="0.55"/>
</svg>
