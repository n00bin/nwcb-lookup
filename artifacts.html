<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artifacts — Neverwinter Compendium</title>
  <meta name="description" content="All Neverwinter artifacts with item levels, stats, set bonuses, sources, and combat power details.">
  <meta property="og:title" content="Artifacts — Neverwinter Compendium">
  <meta property="og:description" content="All Neverwinter artifacts with item levels, stats, set bonuses, sources, and combat power details.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <style>
    .view-tab {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-bottom: none;
      border-radius: var(--radius-sm) var(--radius-sm) 0 0;
      color: var(--text-secondary);
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      font-family: var(--font-main);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .view-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .view-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .art-container { max-width: 900px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }
    .art-view { display: none; }
    .art-view.active { display: block; }
    .art-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
    }
    .art-card:hover { border-color: var(--border-accent); }
    .art-card.open { border-color: var(--accent); }
    .art-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .art-card-name { font-weight: 700; font-size: 1.05rem; }
    .art-card-body { display: none; margin-top: 0.75rem; }
    .art-card.open .art-card-body { display: block; }
    .art-icon { width: 64px; height: 64px; float: left; margin: 0 0.75rem 0.5rem 0; border-radius: var(--radius-sm); border: 1px solid var(--border-default); }
    .art-list-icon { width: 28px; height: 28px; border-radius: var(--radius-sm); margin-right: 0.5rem; vertical-align: middle; }
    .art-info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--border-default);
      font-size: 0.88rem;
    }
    .art-info-row:last-child { border-bottom: none; }
    .art-info-label { color: var(--text-secondary); }
    .art-info-value { font-weight: 600; color: var(--text-primary); text-align: right; max-width: 65%; }
    .art-effect {
      background: var(--bg-elevated);
      border-left: 3px solid var(--accent);
      padding: 0.5rem 0.8rem;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      line-height: 1.5;
    }
    .art-set {
      background: var(--bg-elevated);
      border-left: 3px solid var(--highlight);
      padding: 0.5rem 0.8rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }
    .section-divider {
      font-size: 0.85rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--highlight);
      padding: 1.25rem 0 0.4rem; border-bottom: 1px solid var(--border-default);
      margin-bottom: 0.75rem;
    }
    .section-divider:first-child { padding-top: 0; }
    .toggle-arrow { transition: transform 0.2s; font-size: 0.8rem; color: var(--text-muted); }
    .art-card.open .toggle-arrow { transform: rotate(90deg); }
    .rank-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 0.8rem 1rem;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }
    .rank-card:hover { border-color: var(--border-accent); }

    .ranking-info {
      background: linear-gradient(135deg, rgba(240, 136, 62, 0.08), rgba(240, 136, 62, 0.02));
      border: 1px solid rgba(240, 136, 62, 0.4);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: flex;
      gap: 0.85rem;
      align-items: flex-start;
    }
    .ranking-info-icon {
      flex-shrink: 0;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(240, 136, 62, 0.15);
      border: 1px solid rgba(240, 136, 62, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0883e;
      font-size: 1.15rem;
      font-weight: 700;
    }
    .ranking-info-body { flex: 1; }
    .ranking-info-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f0883e;
      margin-bottom: 0.35rem;
    }
    .ranking-info-text {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.55;
    }
    .ranking-info-text strong { color: var(--text-primary); }
    .ranking-info-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.55rem;
    }
    .ranking-info-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      background: rgba(240, 136, 62, 0.1);
      color: #f0883e;
      border: 1px solid rgba(240, 136, 62, 0.3);
      font-weight: 600;
    }

    /* Item Level + Combined Rating pills */
    .art-il-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.65rem 0;
    }
    .art-il-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.82rem;
    }
    .art-il-label {
      color: var(--text-muted);
      font-weight: 500;
    }
    .art-il-value {
      color: var(--accent);
      font-weight: 700;
      font-family: var(--font-mono, monospace);
    }

    /* Stats block */
    .art-stats-block {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.85rem;
      margin: 0.55rem 0;
    }
    .art-stats-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--highlight);
      margin-bottom: 0.5rem;
    }
    .art-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.3rem 1rem;
    }
    @media (max-width: 540px) {
      .art-stats-grid { grid-template-columns: 1fr; }
    }
    .art-stat-row {
      display: flex;
      justify-content: space-between;
      padding: 0.2rem 0;
      font-size: 0.85rem;
      border-bottom: 1px dashed rgba(255,255,255,0.05);
    }
    .art-stat-row:last-child { border-bottom: none; }
    .art-stat-name { color: var(--text-secondary); }
    .art-stat-value {
      color: var(--stat-positive, #58a6ff);
      font-weight: 600;
      font-family: var(--font-mono, monospace);
    }
  </style>
</head>
<body>
  <nav class="navbar"></nav>

  <div class="controls-bar" style="gap:0.25rem;padding-bottom:0;">
    <button class="view-tab active" data-tab="all">All Artifacts</button>
    <button class="view-tab" data-tab="ranking">Dungeon / Trial Ranking</button>
    <!-- Artifact Sets tab hidden — data and rendering kept in JS for easy restoration. To re-enable, remove style="display:none" below. -->
    <button class="view-tab" data-tab="sets" style="display:none;">Artifact Sets</button>
  </div>

  <!-- Filters for All Artifacts view -->
  <div class="controls-bar" id="all-controls">
    <input type="text" class="search-input" id="search" placeholder="Search artifacts...">
    <select class="filter-select" id="filter-type">
      <option value="">All Types</option>
      <option value="debuff">Group Debuff</option>
      <option value="personal">Personal DPS</option>
      <option value="tank">Tank / Mitigation</option>
      <option value="utility">Utility / Healing</option>
      <option value="damage">Damage Only</option>
    </select>
  </div>

  <div class="art-container art-view active" id="view-all"><div id="all-list"></div></div>
  <div class="art-container art-view" id="view-ranking">
    <div class="ranking-info">
      <div class="ranking-info-icon">⚔</div>
      <div class="ranking-info-body">
        <div class="ranking-info-title">How this list is ranked</div>
        <div class="ranking-info-text">
          Sorted by <strong>group debuff strength</strong> — how much each artifact amplifies your party's damage against the enemy. Higher rank = stronger contribution to total team DPS.
        </div>
        <div class="ranking-info-tags">
          <span class="ranking-info-tag">+ Damage Taken</span>
          <span class="ranking-info-tag">− Damage Resistance</span>
        </div>
      </div>
    </div>
    <div id="ranking-list"></div>
  </div>
  <div class="art-container art-view" id="view-sets"><div id="sets-list"></div></div>

  <script src="data/artifacts.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/artifacts-page.js"></script>
</body>
</html>
